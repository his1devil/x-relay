name: ClaudeRemote
options:
  bundleIdPrefix: com.evilat
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    TARGETED_DEVICE_FAMILY: "1"

packages:
  Chat:
    path: ../Chat

targets:
  ClaudeRemote:
    type: application
    platform: iOS
    sources:
      - path: ClaudeRemote/App
      - path: ClaudeRemote/Theme
      - path: ClaudeRemote/Model
      - path: ClaudeRemote/Views
      - path: ClaudeRemote/Resources
    settings:
      base:
        PRODUCT_NAME: ClaudeRemote
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_BUNDLE_IDENTIFIER: dev.antai.xrelay
        INFOPLIST_FILE: ClaudeRemote/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "27"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: M7ZSWL69E9
        CODE_SIGN_IDENTITY: "Apple Development"
    dependencies:
      - package: Chat
        product: ExyteChat
